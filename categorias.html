    <nav class="flex-1 p-4 space-y-2">

      <a href="index.html" class="block px-4 py-2 rounded hover:bg-indigo-700">Inicio</a>

      <a href="historial.html" class="block px-4 py-2 rounded hover:bg-indigo-700">
        Historial de operaciones
      </a>

      <a href="registrar_movimiento.html" class="block px-4 py-2 rounded hover:bg-indigo-700">
        Registrar movimiento
      </a>

      <a href="categorias.html" class="block px-4 py-2 rounded bg-indigo-700">

      <a href="reportes.html" class="block px-4 py-2 rounded hover:bg-indigo-700">

      </a>

      <a href="configuracion.html" class="block px-4 py-2 rounded hover:bg-indigo-700">

      </a>

    </nav>

  </aside>

  <main class="flex-1 p-8 overflow-y-auto">

    <div class="flex justify-between items-center mb-8">

      <h1 class="text-3xl font-bold text-gray-800">Categorías</h1>

      <div class="flex items-center gap-4">

        <button class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg">
          + Nueva categoría
        </button>

        <div class="flex items-center gap-2 text-gray-600">
          👤 Pedro
        </div>

      </div>

    </div>

    <div class="bg-white rounded-xl shadow p-6">

      <div class="space-y-4">

        <div class="flex items-center justify-between border-b pb-4">

          <div class="flex items-center gap-3">
            <span class="text-xl">🍔</span>
            <span class="font-medium">Alimentación</span>
          </div>

          <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm">
            Gasto
          </span>

          <div class="space-x-2">
            <button class="text-indigo-600 hover:underline">
              Editar
            </button>
            <button class="text-red-500 hover:underline">
              Eliminar
            </button>
          </div>

        </div>

        <div class="flex items-center justify-between border-b pb-4">

          <div class="flex items-center gap-3">
            <span class="text-xl">🚗</span>
            <span class="font-medium">Transporte</span>
          </div>

          <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm">

          </span>

          <div class="space-x-2">
            <button class="text-indigo-600 hover:underline">

            </button>
            <button class="text-red-500 hover:underline">

        <div class="flex items-center justify-between border-b pb-4">

          <div class="flex items-center gap-3">
            <span class="text-xl">🎬</span>
            <span class="font-medium">Entretenimiento</span>
          </div>

          <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm">
            Gasto
          </span>

          <div class="space-x-2">
            <button class="text-indigo-600 hover:underline">
              Editar
            </button>
            <button class="text-red-500 hover:underline">

            </button>
          </div>

        </div>

        <div class="flex items-center justify-between">

          <div class="flex items-center gap-3">
            <span class="text-xl">💼</span>
            <span class="font-medium">Salario</span>
          </div>

          <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm">
            Ingreso
          </span>

          <div class="space-x-2">
            <button class="text-indigo-600 hover:underline">
              Editar
            </button>
            <button class="text-red-500 hover:underline">
              Eliminar
            </button>
          </div>

        </div>
